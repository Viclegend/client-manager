name: Build and Push Docker Image

# 觸發條件：當 main 分支有程式碼被 push 上來時，啟動這個流水線
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 賦予這個流水線寫入 GitHub 映像檔倉庫 (GHCR) 的權限
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 複製 GitHub 倉庫裡的程式碼到雲端建置伺服器上
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登入 GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 將大寫的帳號名稱轉換為小寫 (Docker 標籤強制要求小寫)
      - name: Downcase regular repository name
        run: |
          echo "IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 4. 打包 Docker Image 並推送到雲端倉庫
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 標籤設定為 latest，代表最新版本
          tags: ${{ env.IMAGE_NAME }}:latest